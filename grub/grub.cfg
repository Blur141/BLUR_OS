set default=0
set timeout=5
set timeout_style=menu

insmod gzio
insmod part_gpt
insmod part_msdos
insmod xfs
insmod all_video

# BLUR OS GRUB theme
if [ -f /boot/grub/themes/blur/theme.txt ]; then
  set theme=/boot/grub/themes/blur/theme.txt
  export theme
fi

menuentry "BLUR OS (linux-lts)" --class blur --class gnu-linux --class gnu --class os {
    load_video
    set gfxpayload=keep
    insmod gzio
    insmod xfs
    set root='hd0,gpt2'
    linux /boot/vmlinuz-linux-lts root=UUID=CHANGEME_ROOT_UUID rw \
        lsm=landlock,lockdown,yama,integrity,apparmor,bpf \
        apparmor=1 security=apparmor \
        zswap.enabled=1 zswap.compressor=zstd zswap.zpool=z3fold \
        quiet splash loglevel=3 rd.systemd.show_status=auto rd.udev.log_level=3 \
        mitigations=auto \
        LANG=en_US.UTF-8
    initrd /boot/initramfs-linux-lts.img
}

menuentry "BLUR OS (linux-lts) — fallback" --class blur --class gnu-linux {
    load_video
    set gfxpayload=keep
    insmod gzio
    insmod xfs
    set root='hd0,gpt2'
    linux /boot/vmlinuz-linux-lts root=UUID=CHANGEME_ROOT_UUID rw \
        lsm=landlock,lockdown,yama,integrity,apparmor,bpf \
        apparmor=1 security=apparmor
    initrd /boot/initramfs-linux-lts-fallback.img
}

menuentry "UEFI Firmware Settings" --id uefi-firmware {
    fwsetup
}
