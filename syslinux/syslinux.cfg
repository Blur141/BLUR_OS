DEFAULT blur
PROMPT 0
TIMEOUT 30

LABEL blur
  MENU LABEL BLUR OS
  LINUX boot/vmlinuz-linux
  INITRD boot/intel-ucode.img,boot/amd-ucode.img,boot/initramfs-linux.img
  APPEND archisobasedir=arch archisolabel=BLUR_ quiet splash

LABEL blur_safe
  MENU LABEL BLUR OS (safe mode)
  LINUX boot/vmlinuz-linux
  INITRD boot/intel-ucode.img,boot/amd-ucode.img,boot/initramfs-linux.img
  APPEND archisobasedir=arch archisolabel=BLUR_ nomodeset

LABEL memtest
  MENU LABEL Memory Test (memtest86+)
  LINUX boot/memtest86+/memtest.bin
