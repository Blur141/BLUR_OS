# cpupower configuration for NiyasOS
# Loaded by cpupower systemd service

# Governor: schedutil for dynamic scaling, performance for max throughput
GOVERNOR=schedutil

# For AMD Ryzen / Intel: allow boost
MIN_FREQ=""
MAX_FREQ=""

# Disk scheduler hint (also enforced by udev rule)
# nvme: none | ssd: mq-deadline | hdd: bfq
